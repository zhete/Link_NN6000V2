name: Go_Release

on:
  workflow_dispatch:
  schedule:
    # 每 3 天编译一次（UTC 时间，北京时间 = UTC+8）
    # UTC 20:00 = 北京时间 04:00
    - cron: '0 20 */3 * *'

env:
  DEVICE_MODEL: link_nn6000v2_immwrt
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    permissions:
      actions: write
      contents: write
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./nn6000v2/configs/${{ env.DEVICE_MODEL }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: |
          chmod +x ./nn6000v2/scripts/pre_clone_action.sh
          chmod +x ./nn6000v2/scripts/update.sh
          chmod +x ./nn6000v2/scripts/build.sh
          ./nn6000v2/scripts/pre_clone_action.sh ${{ env.DEVICE_MODEL }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./nn6000v2/scripts/build.sh ${{ env.DEVICE_MODEL }}

      - name: Get Kernel Verion
        run: |
          # 获取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="


      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI 密码：147258369" >> release_body.txt
          echo "LAN 地址：10.0.0.1" >> release_body.txt

      - name: Clean Old Releases, Tags and Workflow Runs
        run: |
          # 获取当前发布的 tag
          CURRENT_TAG="${{ env.BUILD_DATE }}_${{ env.DEVICE_MODEL }}"
          echo "当前编译版本：$CURRENT_TAG"
          
          # ========== 清理 Releases 和 Tags ==========
          echo "开始清理旧的 releases..."
          gh release list --limit 100 --json tagName --jq '.[].tagName' | while read -r old_tag; do
            if [ -n "$old_tag" ] && [ "$old_tag" != "$CURRENT_TAG" ]; then
              echo "删除旧版本：$old_tag"
              gh release delete "$old_tag" --cleanup-tag --yes || true
            fi
          done
          
          echo "清理孤立的 tags..."
          git fetch --tags
          git tag -l | grep -v "$CURRENT_TAG" | while read -r tag; do
            echo "删除孤立 tag: $tag"
            git tag -d "$tag" || true
          done
          
          echo "Releases 和 Tags 清理完成！"
          
          # ========== 清理 Workflow 运行记录 ==========
          echo "开始清理旧的 workflow 运行记录..."
          
          # 获取当前工作流 ID
          WORKFLOW_ID=$(gh api /repos/${{ github.repository }}/actions/workflows | jq -r '.workflows[] | select(.name=="Go_Release") | .id')
          echo "Workflow ID: $WORKFLOW_ID"
          
          if [ -z "$WORKFLOW_ID" ]; then
            echo "错误：无法获取 Workflow ID"
            exit 1
          fi
          
          # 获取所有运行记录
          CURRENT_RUN_ID=${{ github.run_id }}
          echo "当前运行 ID: $CURRENT_RUN_ID"
          
          # 获取所有运行记录并删除旧的
          gh api /repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/runs --paginate --jq '.workflow_runs[] | select(.id != '"$CURRENT_RUN_ID"') | .id' | head -n -1 | while read -r run_id; do
            if [ -n "$run_id" ]; then
              echo "删除 workflow 运行记录：$run_id"
              gh api -X DELETE /repos/${{ github.repository }}/actions/runs/$run_id || echo "删除失败：$run_id"
            fi
          done
          
          # 验证删除结果
          REMAINING_RUNS=$(gh api /repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/runs --paginate --jq '.workflow_runs | length')
          echo "剩余运行记录数：$REMAINING_RUNS"
          
          echo "所有清理工作完成！"

      - name: Release Firmware
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ env.DEVICE_MODEL }}
          files: |
            ./firmware/*.bin
            ./firmware/*.manifest
            ./firmware/*.img.gz
            ./firmware/*.itb
            ./firmware/*.fip
            ./firmware/*.ubi
          body_path: ./release_body.txt
          make_latest: true
